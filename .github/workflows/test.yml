name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      # Test matrix = the library plus every package directory. No Mix
      # involved — globbing is sufficient and keeps this job network-free
      # so it runs fast and can't be blocked by a Mix dep failure.
      - id: gen
        run: |
          MATRIX=$(
            { echo nbpr; ls -1d packages/*/; } |
              sed 's|/$||' |
              jq -R '{dir: .}' |
              jq -sc '{include: .}'
          )
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Generated matrix:"
          echo "$MATRIX" | python3 -m json.tool

  test:
    needs: generate-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    name: test (${{ matrix.dir }})

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Restore deps cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.dir }}/deps
            ${{ matrix.dir }}/_build
          key: deps-${{ matrix.dir }}-${{ hashFiles(format('{0}/mix.lock', matrix.dir)) }}
          restore-keys: |
            deps-${{ matrix.dir }}-

      - name: Get deps
        working-directory: ${{ matrix.dir }}
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile (warnings as errors)
        working-directory: ${{ matrix.dir }}
        run: mix compile --warnings-as-errors

      - name: Test
        working-directory: ${{ matrix.dir }}
        run: mix test
